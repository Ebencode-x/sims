<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — SIMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="auth-shell">
        <div class="auth-visual">
            <img src="images/warehouse.jpg" alt="Warehouse shelves stocked with inventory">
            <div class="auth-visual-overlay">
                <div class="brand-text">SIMS<br><small>Smart Inventory</small></div>
                <p>Sign in to see your live stock levels, low-stock alerts, and category reports.</p>
            </div>
        </div>

        <div class="auth-form-side">
            <div class="auth-form-card">
                <h1>Welcome back</h1>
                <div class="subtitle">Log in to your SIMS account.</div>

                <div class="form-error" id="form-error"></div>

                <form id="login-form">
                    <div class="field">
                        <label for="username">Username</label>
                        <input type="text" id="username" required autofocus>
                    </div>
                    <div class="field">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Log In</button>
                </form>

                <div class="auth-switch">
                    Don't have an account? <a href="register.html">Create one</a>
                </div>
                <div class="auth-switch">
                    <a href="index.html">&larr; Back to home</a> &middot; <a href="about.html">About the system</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="landing-footer" id="page-footer"></footer>

    <script src="js/contact.js"></script>
    <script>
        document.getElementById("page-footer").innerHTML = renderFooterHTML();
    </script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errorBox = document.getElementById("form-error");
            errorBox.classList.remove("visible");

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Could not log in.");
                }

                window.location.href = "dashboard.html";
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.add("visible");
            }
        });
    </script>
</body>

</html>
