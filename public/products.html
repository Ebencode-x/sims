<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory — SIMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main">
            <header class="topbar" id="topbar"></header>

            <main class="content" id="page-content" data-title="Inventory" data-subtitle="Every product currently on record">

                <div class="toolbar">
                    <div class="search-box">
                        <span class="mono" style="color: var(--muted); font-size: 0.85rem;">Search</span>
                        <input type="text" id="search-input" placeholder="Product name or SKU...">
                    </div>
                    <div style="display:flex; gap:0.6rem; align-items:center;">
                        <select id="category-filter">
                            <option value="">All categories</option>
                        </select>
                        <a class="btn btn-primary" href="add-product.html">+ Add Product</a>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>SKU</th>
                                <th>Category</th>
                                <th>Quantity</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="product-table-body">
                        </tbody>
                    </table>
                    <div id="empty-state-wrap"></div>
                </div>

            </main>

            <footer class="page-footer" id="page-footer"></footer>
        </div>
    </div>

    <!-- Edit modal -->
    <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(20,33,61,0.45); align-items:center; justify-content:center; z-index:50;">
        <div class="form-card" style="width: 100%; max-width: 480px;">
            <h2 style="font-size: 1.05rem;">Edit Product</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="field">
                    <label for="edit-name">Product Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                <div class="field">
                    <label for="edit-sku">SKU</label>
                    <input type="text" id="edit-sku" required>
                </div>
                <div class="form-grid">
                    <div class="field">
                        <label for="edit-quantity">Quantity</label>
                        <input type="number" id="edit-quantity" required>
                    </div>
                    <div class="field">
                        <label for="edit-price">Price</label>
                        <input type="number" step="0.01" id="edit-price" required>
                    </div>
                </div>
                <div class="field">
                    <label for="edit-category">Category</label>
                    <input type="text" id="edit-category">
                </div>
                <div style="display:flex; gap:0.6rem; justify-content:flex-end; margin-top: 0.5rem;">
                    <button type="button" class="btn btn-ghost" id="edit-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/contact.js"></script>
    <script src="js/components.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/products.js"></script>
</body>

</html>
